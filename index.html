<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="음력달력">
  <title>음력 생일 달력</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ════════════════ 홈 ════════════════ -->
  <div id="view-home" class="view">
    <div class="header">
      <div>
        <h1>🌙 생일 & 일정</h1>
        <div class="sub" id="today-str"></div>
      </div>
    </div>
    <div class="scroll-area" id="home-list"></div>
    <button class="fab" onclick="openAddSheet()">+</button>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">
        <span class="icon">🏠</span>홈
      </button>
      <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">
        <span class="icon">📅</span>달력
      </button>
    </div>
  </div>

  <!-- ════════════════ 생일 추가 ════════════════ -->
  <div id="view-add-birthday" class="view">
    <div class="header">
      <button class="back-btn" onclick="showView('home')">‹</button>
      <h1>🎂 생일 추가</h1>
    </div>
    <div class="scroll-area">
      <form id="add-birthday-form" onsubmit="submitBirthday(event)">
        <input type="hidden" id="birthday-type-input" value="lunar">

        <!-- 양력/음력 토글 -->
        <div class="form-group">
          <label>달력 종류</label>
          <div class="toggle-group">
            <button type="button" id="btn-lunar" class="toggle-btn active" onclick="setCalType('lunar')">🌙 음력</button>
            <button type="button" id="btn-solar" class="toggle-btn" onclick="setCalType('solar')">☀️ 양력</button>
          </div>
        </div>

        <div class="form-group">
          <label>이름</label>
          <input type="text" id="add-name" placeholder="홍길동" maxlength="10" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>월 (1~12)</label>
            <input type="number" id="add-month" placeholder="1" min="1" max="12" required>
          </div>
          <div class="form-group">
            <label>일 (1~30)</label>
            <input type="number" id="add-day" placeholder="1" min="1" max="30" required>
          </div>
        </div>

        <div class="form-group" id="leap-group" style="display:flex">
          <label class="checkbox-label">
            <input type="checkbox" id="add-leap">
            <span>윤달 생일이에요</span>
          </label>
        </div>

        <div class="info-box">
          💡 음력 생일을 모르면 가족이나 어른께 여쭤보거나, 기념품에 적혀 있을 수도 있어요.
        </div>
        <button type="submit" class="btn-primary">저장하기</button>
      </form>
    </div>
  </div>

  <!-- ════════════════ 일정 추가 ════════════════ -->
  <div id="view-add-event" class="view">
    <div class="header">
      <button class="back-btn" onclick="showView('home')">‹</button>
      <h1>📌 일정 추가</h1>
    </div>
    <div class="scroll-area">
      <form id="add-event-form" onsubmit="submitEvent(event)">
        <div class="form-group">
          <label>제목</label>
          <input type="text" id="event-title" placeholder="예: 할머니 팔순 잔치" maxlength="30" required>
        </div>
        <div class="form-group">
          <label>날짜</label>
          <input type="date" id="event-date" required>
        </div>
        <div class="form-group">
          <label>시간 <span class="optional">(선택)</span></label>
          <input type="time" id="event-time">
        </div>
        <div class="form-group">
          <label>메모 <span class="optional">(선택)</span></label>
          <textarea id="event-memo" placeholder="장소, 준비물 등..." rows="3"></textarea>
        </div>
        <button type="submit" class="btn-primary">저장하기</button>
      </form>
    </div>
  </div>

  <!-- ════════════════ 생일 상세 ════════════════ -->
  <div id="view-detail-birthday" class="view">
    <div class="header">
      <button class="back-btn" onclick="showView('home')">‹</button>
      <h1>생일 상세</h1>
    </div>
    <div class="scroll-area" style="padding:0 0 80px">
      <div class="detail-hero">
        <div class="detail-avatar" id="detail-avatar">?</div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-lunar-info" id="detail-lunar"></div>
      </div>
      <div style="padding:20px 16px">
        <div class="section-title">연도별 양력 날짜</div>
        <table class="birthday-table">
          <thead>
            <tr><th>연도</th><th>양력 날짜</th><th>D-day</th></tr>
          </thead>
          <tbody id="detail-table"></tbody>
        </table>
        <button class="btn-danger" onclick="deleteBirthday()">🗑 삭제</button>
      </div>
    </div>
  </div>

  <!-- ════════════════ 일정 상세 ════════════════ -->
  <div id="view-detail-event" class="view">
    <div class="header">
      <button class="back-btn" onclick="showView('home')">‹</button>
      <h1>일정 상세</h1>
    </div>
    <div class="scroll-area">
      <div class="event-detail-hero">
        <div class="event-detail-icon">📌</div>
        <div class="event-detail-title" id="ev-detail-title"></div>
        <div class="ev-dday-badge" id="ev-detail-dday"></div>
      </div>
      <div class="event-detail-body">
        <div class="event-info-row">
          <span class="ev-info-label">📅 날짜</span>
          <span id="ev-detail-date"></span>
        </div>
        <div class="event-info-row" id="ev-time-row">
          <span class="ev-info-label">⏰ 시간</span>
          <span id="ev-detail-time"></span>
        </div>
        <div class="event-info-row" id="ev-memo-row">
          <span class="ev-info-label">📝 메모</span>
          <span id="ev-detail-memo" style="white-space:pre-wrap"></span>
        </div>
      </div>
      <div style="padding:0 16px">
        <button class="btn-danger" onclick="deleteEvent()">🗑 삭제</button>
      </div>
    </div>
  </div>

  <!-- ════════════════ 달력 ════════════════ -->
  <div id="view-calendar" class="view">
    <div class="header">
      <div>
        <h1>📅 달력</h1>
        <div class="sub">날짜를 눌러 확인</div>
      </div>
    </div>
    <div class="scroll-area">
      <div class="cal-header">
        <button class="cal-nav" onclick="renderCalendar(0,-1)">‹</button>
        <h2 id="cal-title"></h2>
        <button class="cal-nav" onclick="renderCalendar(0,1)">›</button>
      </div>
      <table class="cal-table">
        <thead>
          <tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr>
        </thead>
        <tbody id="cal-body"></tbody>
      </table>
      <div class="cal-legend" id="cal-legend"></div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn" data-tab="home" onclick="switchTab('home')">
        <span class="icon">🏠</span>홈
      </button>
      <button class="tab-btn active" data-tab="calendar" onclick="switchTab('calendar')">
        <span class="icon">📅</span>달력
      </button>
    </div>
  </div>

  <!-- ════════════════ 바텀시트 ════════════════ -->
  <div id="sheet-overlay" class="sheet-overlay" onclick="closeAddSheet()"></div>
  <div id="add-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <p class="sheet-title">무엇을 추가할까요?</p>
    <div class="sheet-buttons">
      <button class="sheet-btn" onclick="openAddBirthday()">
        <span class="sheet-btn-icon">🎂</span>
        <span class="sheet-btn-label">생일</span>
        <span class="sheet-btn-sub">매년 반복</span>
      </button>
      <button class="sheet-btn" onclick="openAddEvent()">
        <span class="sheet-btn-icon">📌</span>
        <span class="sheet-btn-label">일정</span>
        <span class="sheet-btn-sub">날짜·시간·메모</span>
      </button>
    </div>
  </div>

</div>
<script src="lunar.js"></script>
<script src="app.js"></script>
</body>
</html>
